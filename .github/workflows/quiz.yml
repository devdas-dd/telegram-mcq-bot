on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ICT MCQ Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}    # ← fix this line
        run: python main.py

      - name: Show bot log        # ← ADD THIS
        if: always()
        run: cat bot.log || echo "No log file found"

      - name: Save used questions (prevent repeats)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_questions.json
          git diff --staged --quiet || git commit -m "chore: update used questions [skip ci]"
          git push
